<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<link rel="stylesheet" href="style3.css">

</head>

<body>

<h1 class="heading">
Checkout
</h1>

<div class="checkout-card">

<h2>Your Order</h2>

<div id="checkout-items">

</div>

<hr>

<h3>
Subtotal :
Rs.
<span id="checkout-total">0</span>
</h3>

<h3>
Delivery Fee :
Rs.
150
</h3>
<div class="promo-box">

    <input
        type="text"
        id="promo-code"
        placeholder="Enter Promo Code">

    <button id="apply-promo">
        Apply
    </button>

</div>

<p id="discount-text">
    Discount : Rs.0
</p>

<h2>
Grand Total :
Rs.
<span id="final-total">0</span><hr>
<h2>Adress</h2>
</h2>

<div class="customer-form">

    <input type="text"
           id="customer-name"
           placeholder="Full Name"
           required>

    <input type="tel"
           id="customer-phone"
           placeholder="Phone Number"
           required>
<h4>Adress</h4>
    <textarea
        id="customer-address"
        placeholder="Delivery Address"
        rows="4"
        required>
    </textarea>


    <p class="delivery">
🛵 30-40 min
</p>

    <select id="payment">

        <option value="Cash on Delivery">
            Cash on Delivery
        </option>

        <option value="Credit Card">
            Credit Card
        </option>

        <option value="Debit Card">
            Debit Card
        </option>

    </select>

    <textarea
        id="notes"
        placeholder="Order Notes (Optional)"
        rows="3">
    </textarea>

</div>

<button id="place-order">

Place Order

</button>

</div>

<script src="checkout1.js"></script>

</body>

</html>
